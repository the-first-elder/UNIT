<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fafafa" />
      <stop offset="100%" stop-color="#a1a1aa" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Subtle glow behind mark -->
  <rect x="28" y="18" width="120" height="120" rx="28" fill="url(#glowGrad)" opacity="0.4" />

  <!-- Logo mark background -->
  <rect x="30" y="20" width="116" height="116" rx="26" fill="#121214" stroke="url(#logoGrad)" stroke-width="1.5" />

  <!-- U shape - left pillar -->
  <rect x="52" y="44" width="10" height="56" rx="5" fill="url(#logoGrad)" />

  <!-- U shape - right pillar -->
  <rect x="114" y="44" width="10" height="56" rx="5" fill="url(#logoGrad)" />

  <!-- U shape - bottom curve left segment -->
  <path d="M52 88 C52 100, 62 108, 76 108" stroke="url(#logoGrad)" stroke-width="10" stroke-linecap="round" fill="none" />

  <!-- U shape - bottom curve right segment -->
  <path d="M124 88 C124 100, 114 108, 100 108" stroke="url(#logoGrad)" stroke-width="10" stroke-linecap="round" fill="none" />

  <!-- Center node dot -->
  <circle cx="88" cy="78" r="5" fill="#3b82f6" />
  <circle cx="88" cy="78" r="8" fill="url(#logoGrad)" opacity="0.2" />
  <circle cx="88" cy="78" r="12" fill="url(#logoGrad)" opacity="0.1" />

  <!-- Circuit line top -->
  <path d="M66 44 L66 38 L110 38 L110 44" stroke="url(#logoGrad)" stroke-width="1.5" stroke-opacity="0.3" fill="none" />
  <circle cx="66" cy="38" r="1.5" fill="#3b82f6" />
  <circle cx="110" cy="38" r="1.5" fill="#3b82f6" />

  <!-- Subtle grid dots inside -->
  <circle cx="74" cy="60" r="1" fill="#3b82f6" opacity="0.2" />
  <circle cx="102" cy="60" r="1" fill="#06b6d4" opacity="0.2" />
  <circle cx="88" cy="66" r="1" fill="#3b82f6" opacity="0.15" />
  <circle cx="74" cy="96" r="1" fill="#06b6d4" opacity="0.15" />
  <circle cx="102" cy="96" r="1" fill="#3b82f6" opacity="0.15" />

  <!-- Text -->
  <text x="168" y="88" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="url(#textGrad)">UNIT</text>

  <!-- Tagline -->
  <text x="170" y="128" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="500" letter-spacing="8" fill="#52525b" text-transform="uppercase">AUTONOMOUS DEFI EXECUTION</text>
</svg>
